plugins {
	id 'java'
}

group = 'com.project'
version = '0.0.1-SNAPSHOT'

java {
	toolchain {
		languageVersion = JavaLanguageVersion.of(25)
	}
}

repositories {
	mavenCentral()
}

subprojects {

	apply plugin: 'java'

	java {
		toolchain {
			languageVersion = JavaLanguageVersion.of(25)
		}
	}

	repositories {
		mavenCentral()
	}

	tasks.withType(JavaCompile).configureEach {
		options.compilerArgs += [
				rootDir.toString() + '/*/src/main/java'
		]
	}
}